                <div class="input-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" class="usuario" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" class="contraseña" required>
                </div>

                <button type="submit" class="login-btn">Entrar</button>
                
                <a href="recuperarcontraseña.html" class="forgot-password">¿Olvidaste tu contraseña?</a>
                <a href="registrarse.html" class="forgot-password">¿Eres nuevo? Registrate</a>
